services:
  mongo:
    image: mongo:latest
    container_name: mongo
    ports:
      - "27017:27017"
    command: ["mongod", "--replSet", "rs0", "--keyFile", "/etc/mongo-keyfile", "--bind_ip_all"]
    healthcheck:
      test: mongosh --host localhost:27017 --eval 'db.adminCommand("ping")' || exit 1
      interval: 5s
      timeout: 30s
      start_period: 0s
      start_interval: 1s
      retries: 30
    volumes:
      - mongo_data:/data/db
      - ./envs/mongo-keyfile:/etc/mongo-keyfile:ro
    env_file:
      - envs/mongo_db.env
    networks:
      - backend_net

  mongo-init-replica:
    image: mongo:latest
    container_name: mongo-init-replica
    depends_on:
      mongo:
        condition: service_healthy
    env_file:
      - envs/mongo_db.env
    volumes:
      - ./scripts/init-replica.sh:/docker-entrypoint-initdb.d/init-replica.sh:ro
    entrypoint: ["/docker-entrypoint-initdb.d/init-replica.sh"]
    networks:
      - backend_net

  mongo-seed:
    image: mongo:latest
    container_name: mongo-seed
    depends_on:
      mongo-init-replica:
        condition: service_completed_successfully
    env_file:
      - envs/mongo_db.env
    volumes:
      - ./scripts/seed-data.js:/seed-data.js:ro
    entrypoint:
      - mongosh
      - --host
      - mongo:27017
      - -u
      - root
      - -p
      - rootpassword
      - --authenticationDatabase
      - admin
      - food-delivery
      - /seed-data.js
    networks:
      - backend_net

  redis:
    image: redis:7-alpine
    container_name: redis
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5
    volumes:
      - redis_data:/data
    networks:
      - backend_net

  order-service:
    build:
      context: .
      dockerfile: orders/Dockerfile
      target: development
    container_name: order-service
    working_dir: /app
    env_file:
      - envs/mongo_db.env
      - envs/redis.env
    environment:
      - DEBUG=true
      - CORS_ALLOW_ORIGINS=["http://localhost","http://localhost:3000"]
    volumes:
      - ./orders:/app
      - ./shared:/shared
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8003/api/v1/health/readiness"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 15s
    depends_on:
      mongo-init-replica:
        condition: service_completed_successfully
      redis:
        condition: service_healthy
    ports:
      - "8003:8003"
    networks:
      - backend_net

  delivery-service:
    build:
      context: .
      dockerfile: delivery/Dockerfile
      target: development
    container_name: delivery-service
    working_dir: /app
    env_file:
      - envs/mongo_db.env
      - envs/redis.env
    environment:
      - DEBUG=true
    volumes:
      - ./delivery:/app
      - ./shared:/shared
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8001/api/v1/health/readiness"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 15s
    depends_on:
      mongo-init-replica:
        condition: service_completed_successfully
      redis:
        condition: service_healthy
    ports:
      - "8001:8001"
    networks:
      - backend_net

  notifications-service:
    build:
      context: .
      dockerfile: notifications/Dockerfile
      target: development
    container_name: notifications-service
    working_dir: /app
    env_file:
      - envs/redis.env
    environment:
      - DEBUG=true
      - CORS_ALLOW_ORIGINS=["http://localhost","http://localhost:3000"]
    volumes:
      - ./notifications:/app
      - ./shared:/shared
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8002/api/v1/health/readiness"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 15s
    depends_on:
      redis:
        condition: service_healthy
    ports:
      - "8002:8002"
    networks:
      - backend_net

  order-simulator:
    build:
      context: .
      dockerfile: simulator/Dockerfile
    container_name: order-simulator
    working_dir: /app
    volumes:
      - ./simulator:/app
      - ./shared:/shared
    env_file:
      - envs/redis.env
      - envs/simulator.env
    depends_on:
      order-service:
        condition: service_healthy
      delivery-service:
        condition: service_healthy
      notifications-service:
        condition: service_healthy
    networks:
      - backend_net

  frontend:
    build:
      context: ./frontend
      target: development
      args:
        VITE_ENV: development
    container_name: frontend
    ports:
      - "3000:3000"
    volumes:
      - ./frontend:/app
      - node_modules:/app/node_modules
    restart: on-failure
    command: npm run dev
    depends_on:
      order-service:
        condition: service_healthy
    networks:
      - frontend_net
      - backend_net

  nginx:
    image: nginx:alpine
    container_name: nginx-proxy
    ports:
      - "80:80"
    volumes:
      - ./nginx/nginx.dev.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      order-service:
        condition: service_healthy
      notifications-service:
        condition: service_healthy
      frontend:
        condition: service_started
    networks:
      - backend_net
      - frontend_net

volumes:
  mongo_data:
  redis_data:
  node_modules:

networks:
  backend_net:
  frontend_net:
