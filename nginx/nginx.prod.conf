upstream orders_api {
    server order-service:8003;
}

upstream notifications_api {
    server notifications-service:8002;
}

limit_req_zone $binary_remote_addr zone=api_limit:10m rate=30r/s;

server {
    listen 80;
    server_name _;

    # Security headers
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-XSS-Protection "1; mode=block" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;

    # Gzip compression
    gzip on;
    gzip_vary on;
    gzip_min_length 1024;
    gzip_types text/plain text/css application/json application/javascript text/xml;

    # Proxy defaults
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
    proxy_connect_timeout 10s;
    proxy_read_timeout 30s;
    proxy_send_timeout 30s;
    proxy_buffering on;

    # Orders & Menu API
    location /api/v1/orders {
        limit_req zone=api_limit burst=20 nodelay;
        proxy_pass http://orders_api;
    }

    location /api/v1/menu {
        limit_req zone=api_limit burst=20 nodelay;
        proxy_pass http://orders_api;
    }

    location /api/v1/health {
        proxy_pass http://orders_api;
    }

    # WebSocket - Order Tracking
    location /ws/v1/order-tracking {
        proxy_pass http://notifications_api;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_read_timeout 3600s;
        proxy_send_timeout 3600s;
    }

    # Deny everything else
    location / {
        return 404;
    }
}
