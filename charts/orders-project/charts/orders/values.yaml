replicaCount: 3
image:
  repository: kkaarroollm/orders-service
  tag: latest
  pullPolicy: Always

containerPort: 8003
service:
  port: 80

resources:
  requests:
    cpu: "100m"
    memory: "128Mi"
  limits:
    cpu: "300m"
    memory: "256Mi"

environment: PRODUCTION
debug: false

cors:
  allowOrigins:
    - https://orders.karolmarszalek.me
  allowMethods:
    - GET
    - POST
  allowHeaders:
    - "*"

allowedHosts:
  - orders.karolmarszalek.me

livenessProbeUrl: api/v1/health/liveness
readinessProbeUrl: api/v1/health/readiness
