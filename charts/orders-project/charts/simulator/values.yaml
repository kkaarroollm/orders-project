replicaCount: 1
image:
  repository: kkaarroollm/simulator-service
  tag: latest
  pullPolicy: Always

containerPort: 8001
service:
  port: 80

resources:
  requests:
    cpu: "50m"
    memory: "64Mi"
  limits:
    cpu: "200m"
    memory: "128Mi"

simulator:
  orderConfirmingDelay: "20"
  orderPreparingDelay: "200"
  deliveryWaitingDelay: "40"
  deliveryWayDelay: "20"
