namespace: prod

global:
  fullnameOverride: orders-project
  mongo:
    username: root
    password: SuperSecretMongoPassword123
    port: "27017"
    host: mongo-svc
    database: food-delivery

  redis:
    password: RedisPasswordSuperSecret321
    port: "6379"
    host: redis-svc

ingress-nginx:
  enabled: true
  controller:
    config:
      use-forwarded-headers: true
    ingressClassResource:
      enabled: true
    ingressClass: nginx


ingress:
  enabled: true
  host: orders.localhost
  className: nginx
  annotations:
    kubernetes.io/ingress.class: nginx
    nginx.ingress.kubernetes.io/enable-websocket: "true"
    nginx.ingress.kubernetes.io/proxy-read-timeout: "7200"
    nginx.ingress.kubernetes.io/proxy-send-timeout: "7200"

kube-prometheus-stack:
  enabled: true
  grafana:
    adminPassword: admin
    grafana.ini:
      server:
        root_url: "%(protocol)s://%(domain)s/grafana/"
        serve_from_sub_path: true
      auth.anonymous:
        enabled: true
        org_role: Viewer
    additionalDataSources:
      - name: Loki
        type: loki
        url: http://loki:3100
        access: proxy
        isDefault: false
  prometheus:
    prometheusSpec:
      serviceMonitorSelectorNilUsesHelmValues: false
      retention: 3d
      retentionSize: 256MB

loki:
  enabled: true
  deploymentMode: SingleBinary
  loki:
    auth_enabled: false
    commonConfig:
      replication_factor: 1
    limits_config:
      retention_period: 72h
      ingestion_rate_mb: 4
      ingestion_burst_size_mb: 8
    storage:
      type: filesystem
    schemaConfig:
      configs:
        - from: "2024-01-01"
          store: tsdb
          object_store: filesystem
          schema: v13
          index:
            prefix: index_
            period: 24h
  singleBinary:
    replicas: 1
  read:
    replicas: 0
  write:
    replicas: 0
  backend:
    replicas: 0

promtail:
  enabled: true

